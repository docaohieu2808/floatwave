<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://www.youtube.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; connect-src 'self'" />
  <title>FloatWave</title>
  <link rel="icon" href="assets/floatwave.png" />
  <link rel="stylesheet" href="renderer/styles.css" />
</head>
<body>
  <!-- Roon-style backdrop: current track artwork, scaled + blurred + dimmed -->
  <div id="artwork-bg"></div>

  <!-- Custom titlebar (frameless window): draggable, buttons are no-drag -->
  <header id="titlebar">
    <div id="track-info">
      <div id="track-title">No track</div>
      <div id="track-artist">&mdash;</div>
    </div>
    <!-- icons injected at boot from renderer/icons.js (SVG, no emoji) -->
    <div id="titlebar-buttons">
      <button id="btn-pin" title="Pin on top"></button>
      <button id="btn-focus-mode" title="Focus mode (compact bar)"></button>
      <button id="btn-cinema" title="Cinema mode — hide bars (double-click the video to exit)"></button>
      <button id="btn-web-mode" title="YouTube Music (web)"></button>
      <button id="btn-panel" title="Queue / Favorites"></button>
      <button id="btn-minimize" title="Minimize"></button>
      <button id="btn-close" title="Close"></button>
    </div>
  </header>

  <div id="search-bar">
    <!-- 🎵 Music (YT Music songs) ⇄ 🎬 Video (real YouTube videos) search mode -->
    <button id="btn-search-mode" title="Search mode"></button>
    <input id="search-input" type="text" spellcheck="false"
           placeholder="Search YouTube or paste a link…" />
    <!-- recent searches dropdown (shown when the empty input is focused) -->
    <div id="search-history" class="hidden"></div>
  </div>

  <main id="content">
    <div id="player-wrap">
      <div id="player"></div>
    </div>

    <!-- drag the video to move the window — over the iframe, under all overlays -->
    <div id="player-drag"></div>

    <!-- Branded splash shown when nothing is playing (empty player area) -->
    <div id="brand-splash" class="hidden">
      <img id="brand-logo" src="assets/floatwave.png" alt="FloatWave" />
      <div id="brand-name">FloatWave</div>
      <div id="brand-tagline">Stream video, float music</div>
    </div>

    <!-- Fallback overlay for embed-blocked / failed videos -->
    <div id="player-fallback" class="hidden">
      <p id="fallback-message"></p>
      <button id="btn-open-youtube">Open on YouTube</button>
    </div>

    <!-- Backend B (hidden YouTube Music) has no visible video here — show the
         track artwork + a caption so the player area isn't blank -->
    <div id="web-art" class="hidden">
      <div id="web-art-bg"></div>
      <img id="web-art-img" alt="" />
      <div id="web-art-caption">Playing via YouTube Music</div>
    </div>

    <!-- Sliding panel: search results / queue / favorites -->
    <section id="panel" class="hidden">
      <nav id="panel-tabs">
        <button class="tab active" data-tab="results">Results</button>
        <button class="tab" data-tab="queue">Queue</button>
        <button class="tab" data-tab="favorites">Favorites</button>
        <button class="tab" data-tab="playlists">Playlists</button>
        <button id="btn-panel-close" title="Close panel"></button>
      </nav>
      <div id="panel-message" class="hidden"></div>
      <ul id="list-results" class="track-list"></ul>
      <ul id="list-queue" class="track-list hidden"></ul>
      <ul id="list-favorites" class="track-list hidden"></ul>
      <ul id="list-playlists" class="track-list hidden"></ul>
    </section>

    <!-- "Add to…" chooser: current queue / a playlist / create new playlist -->
    <div id="playlist-chooser" class="hidden">
      <div id="chooser-box">
        <div id="chooser-title">Add to&hellip;</div>
        <ul id="chooser-options"></ul>
        <div id="chooser-new">
          <input id="chooser-new-name" type="text" placeholder="New playlist name&hellip;" spellcheck="false" />
          <button id="chooser-create">Create</button>
        </div>
      </div>
    </div>
  </main>

  <footer id="controls">
    <div id="seek-row">
      <span id="time-current">0:00</span>
      <input id="seek" type="range" min="0" max="100" step="0.1" value="0" />
      <span id="time-total">0:00</span>
    </div>
    <div id="buttons-row">
      <button id="btn-repeat" title="Repeat: off"></button>
      <button id="btn-prev" title="Previous"></button>
      <button id="btn-play" title="Play / Pause"></button>
      <button id="btn-next" title="Next"></button>
      <input id="volume" type="range" min="0" max="100" value="50" title="Volume" />
      <button id="btn-dislike" title="Dislike: skip &amp; stop suggesting this"></button>
      <button id="btn-favorite" title="Favorite"></button>
    </div>
  </footer>

  <!-- bottom-corner resize grips (the only resize handles; native edges are blocked) -->
  <div id="resize-grip-left" class="resize-grip" title="Drag to resize"></div>
  <div id="resize-grip-right" class="resize-grip" title="Drag to resize"></div>

  <script type="module" src="renderer/app.js"></script>
</body>
</html>
